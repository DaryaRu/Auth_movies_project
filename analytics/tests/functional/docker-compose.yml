services:

  postgres:
    image: postgres:17
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --maxclients 20000 --timeout 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  test-auth-service:
    build: ../../../auth
    image: fastapi-auth-image
    restart: unless-stopped
    env_file: .env
    working_dir: /app
    command: >
      sh -c "alembic upgrade head && cd src && gunicorn main:app --workers 4 --forwarded-allow-ips='*'
      --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:7000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:7000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../../private.pem:/app/keys/private.pem:ro
      - ../../../public.pem:/app/keys/public.pem:ro

  mock-kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://mock-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@mock-kafka:9093
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  test-analytics-service:
    build: ../../../analytics
    image: analytics-service-image
    restart: unless-stopped
    env_file: 
      - .env
    working_dir: /app
    environment:
      OTEL_SERVICE_NAME: ${ANALYTICS_OTEL_SERVICE_NAME:-analytics-service}
      KAFKA_BROKERS: "mock-kafka:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    command: >
      sh -c "gunicorn src.main:app
      --workers 1
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:6000
      --forwarded-allow-ips=*
      --timeout 120
      --error-logfile -"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:6000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      test-auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-kafka:
        condition: service_started

  tests:
    build: ../../../analytics     
    image: analytics-test-image
    env_file: .env
    working_dir: /app
    volumes:
      - ../../../private.pem:/app/keys/private.pem:ro
      - ../../../public.pem:/app/keys/public.pem:ro
      - ../../../analytics:/app/analytics  
    ports:
      - "5678:5678"
    depends_on:
      test-analytics-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-kafka:
        condition: service_started
    entrypoint: sh /app/analytics/tests/functional/entrypoint.sh 

volumes:
  auth_pg_data:
