services:
  postgres:
    image: postgres:17
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxclients 20000
      --timeout 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  fastapi-auth:
    build:
      context: ../..
      dockerfile: DockerfileTest
    image: fastapi-image
    env_file: .env
    working_dir: /app
    command: >
      sh -c "alembic upgrade head && cd src && gunicorn main:app --workers 4 --forwarded-allow-ips='*'
      --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:7000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:7000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../private.pem:/app/keys/private.pem:ro
      - ../../public.pem:/app/keys/public.pem:ro

  tests:
    image: fastapi-image
    env_file: .env
    volumes:
      - ../../tests:/app/tests
    ports:
      - "5678:5678"
    depends_on:
      fastapi-auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
    entrypoint: sh /app/tests/functional/entrypoint.sh
