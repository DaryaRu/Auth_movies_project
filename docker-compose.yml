services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxclients 20000
      --timeout 300
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5

  migrate:
    image: auth-image
    env_file: .env
    command: alembic upgrade head
    volumes:
      - ./auth/src/migrations:/app/src/migrations
    depends_on:
      db:
        condition: service_healthy

  auth-service:
    build: ./auth
    image: auth-image
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "gunicorn src.main:app
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --forwarded-allow-ips=*
      --timeout 120
      --error-logfile -"
    volumes:
      - ./private.pem:/app/keys/private.pem:ro
      - ./public.pem:/app/keys/public.pem:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  jaeger-query:
    image: jaegertracing/jaeger-query:1.76.0
    ports:
      - "16686:16686"
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  jaeger-collector:
    image: jaegertracing/jaeger-collector:1.76.0
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - COLLECTOR_OTLP_ENABLED=true
    depends_on:
      elasticsearch:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0-nightly.38e94c7
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    depends_on:
      - jaeger-collector
    restart: unless-stopped

  nginx:
    image: nginx:1.31.2
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/project.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  elastic_data:
