server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;
    server_tokens off;

    location /static/ {
        alias /static/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /media/;
        access_log off;
    }

    location /api/v1/ {
        proxy_pass http://auth-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/auth/openapi {
        proxy_pass http://auth-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/movies/openapi {
        proxy_pass http://movies-service:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/v1/films/ {
        proxy_pass http://movies-service:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/v1/genres/ {
        proxy_pass http://movies-service:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/v1/persons/ {
        proxy_pass http://movies-service:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /admin/ {
        proxy_pass http://movies-admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    location /tracers/ {
        proxy_pass http://jaeger-query:16686;
    }
}